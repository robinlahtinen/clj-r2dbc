name: Tests

permissions:
    contents: read

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        services:
            postgres:
                image: postgres:18.3
                env:
                    POSTGRES_USER: clj_r2dbc
                    POSTGRES_PASSWORD: clj_r2dbc
                    POSTGRES_DB: clj_r2dbc
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            mariadb:
                image: mariadb:12.3.1-rc
                env:
                    MARIADB_USER: clj_r2dbc
                    MARIADB_PASSWORD: clj_r2dbc
                    MARIADB_DATABASE: clj_r2dbc
                    MARIADB_ROOT_PASSWORD: clj_r2dbc_root
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd "healthcheck.sh --connect --innodb_initialized"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            CLJ_R2DBC_TEST_PG_URL: r2dbc:postgresql://clj_r2dbc:clj_r2dbc@localhost:5432/clj_r2dbc
            CLJ_R2DBC_TEST_MARIADB_URL: r2dbc:mariadb://clj_r2dbc:clj_r2dbc@localhost:3306/clj_r2dbc

        steps:
            -   name: Checkout
                uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2
                with:
                    fetch-depth: 1

            -   name: Prepare Java
                uses: actions/setup-java@1d018f9b8b9b505bb578a83b230fabcce01af93b # v5.2.0
                with:
                    distribution: "oracle"
                    java-version: "25"

            -   name: Install Clojure tools
                uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2 # 13.6.0
                with:
                    cli: latest

            -   name: Cache Clojure dependencies
                uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
                with:
                    path: |
                        ~/.m2/repository
                        ~/.gitlibs
                        ~/.deps.clj
                    key: ${{ runner.os }}-cljdeps-${{ hashFiles('deps.edn') }}
                    restore-keys: ${{ runner.os }}-cljdeps-

            -   name: Run tests
                run: clojure -T:build test-all
