name: Tests

permissions:
    contents: read

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        services:
            postgres:
                image: postgres:18.3
                env:
                    POSTGRES_USER: clj_r2dbc
                    POSTGRES_PASSWORD: clj_r2dbc
                    POSTGRES_DB: clj_r2dbc
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            mariadb:
                image: mariadb:12.3.1-rc
                env:
                    MARIADB_USER: clj_r2dbc
                    MARIADB_PASSWORD: clj_r2dbc
                    MARIADB_DATABASE: clj_r2dbc
                    MARIADB_ROOT_PASSWORD: clj_r2dbc_root
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd "healthcheck.sh --connect --innodb_initialized"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            CLJ_R2DBC_TEST_PG_URL: r2dbc:postgresql://clj_r2dbc:clj_r2dbc@localhost:5432/clj_r2dbc
            CLJ_R2DBC_TEST_MARIADB_URL: r2dbc:mariadb://clj_r2dbc:clj_r2dbc@localhost:3306/clj_r2dbc

        steps:
            -   name: Checkout
                uses: actions/checkout@v6
                with:
                    fetch-depth: 1

            -   name: Prepare Java
                uses: actions/setup-java@v5
                with:
                    distribution: "oracle"
                    java-version: "26"

            -   name: Install Clojure tools
                uses: DeLaGuardo/setup-clojure@13
                with:
                    cli: latest

            -   name: Cache Clojure dependencies
                uses: actions/cache@v5
                with:
                    path: |
                        ~/.m2/repository
                        ~/.gitlibs
                        ~/.deps.clj
                    key: ${{ runner.os }}-cljdeps-${{ hashFiles('deps.edn') }}
                    restore-keys: ${{ runner.os }}-cljdeps-

            -   name: Run tests
                run: clojure -T:build test-all

            -   name: Run debug TCK (stderr captured for artifact)
                run: clojure -T:build tck-debug-test 2>tck-debug.log || true
                continue-on-error: true

            -   name: Upload TCK debug log
                uses: actions/upload-artifact@v7
                if: always()
                with:
                    name: tck-debug-log-${{ github.sha }}
                    path: tck-debug.log
                    retention-days: 14
                    if-no-files-found: warn
