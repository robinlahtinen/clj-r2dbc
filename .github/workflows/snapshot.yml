name: Snapshot to Clojars

on:
    workflow_run:
        workflows: [ 'Tests' ]
        types: [ completed ]
        branches: [ 'main' ]

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
    cancel-in-progress: true

jobs:
    snapshot:
        if: >
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.head_branch == 'main' &&
            github.event.workflow_run.event == 'push'
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            -   name: Checkout
                uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2
                with:
                    ref: ${{ github.event.workflow_run.head_sha }}
                    fetch-depth: 1

            -   name: Prepare Java
                uses: actions/setup-java@1d018f9b8b9b505bb578a83b230fabcce01af93b # v5.2.0
                with:
                    distribution: 'oracle'
                    java-version: '26'

            -   name: Install Clojure tools
                uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2 # 13.6.0
                with:
                    cli: latest

            -   name: Cache Clojure dependencies
                uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
                with:
                    path: |
                        ~/.m2/repository
                        ~/.gitlibs
                        ~/.deps.clj
                    key: ${{ runner.os }}-cljdeps-${{ hashFiles('deps.edn') }}
                    restore-keys: ${{ runner.os }}-cljdeps-

            -   name: Deploy snapshot
                env:
                    CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
                    CLOJARS_PASSWORD: ${{ secrets.CLOJARS_DEPLOY_TOKEN }}
                run: |
                    clojure -T:build build-jar
                    clojure -T:build deploy
